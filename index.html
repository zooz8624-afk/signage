<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signage</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; width:100vw; height:100vh; overflow:hidden; }

#stage { width:100vw; height:100vh; position:relative; }

/* 슬라이드 — 기본은 뒤에 숨어있음 */
.slide {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:#000;
  opacity: 0;
  z-index: 1;
  transition: none;
}

/* 나가는 슬라이드 — 앞에 있다가 오른쪽으로 밀려남 */
.slide.exit {
  z-index: 2;
  opacity: 1;
  transform: translateX(0);
  transition: transform 0.6s cubic-bezier(0.77,0,0.175,1);
}
.slide.exit.go {
  transform: translateX(-100%);
}

/* 들어오는 슬라이드 — 오른쪽에서 들어옴 */
.slide.enter {
  z-index: 3;
  opacity: 1;
  transform: translateX(100%);
  transition: transform 0.6s cubic-bezier(0.77,0,0.175,1);
}
.slide.enter.go {
  transform: translateX(0);
}

/* 현재 보이는 슬라이드 */
.slide.active {
  z-index: 2;
  opacity: 1;
  transform: translateX(0);
}

.slide img {
  width:100%; height:100%;
  object-fit:contain; display:block;
}
.slide video {
  width:100%; height:100%;
  object-fit:contain; display:block;
  background:#000;
}

/* 빈 화면 */
#empty {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  color:#333; gap:16px; z-index:0;
}
#empty .icon { font-size:64px; }
#empty p { font-size:16px; letter-spacing:0.1em; font-family:sans-serif; }

/* 상태 */
#status {
  position:fixed; bottom:16px; right:16px;
  background:rgba(0,0,0,0.5); color:#444;
  font-size:10px; padding:5px 10px; border-radius:20px;
  font-family:monospace; z-index:99;
}

/* 진행 바 */
#progress-bar {
  position:fixed; bottom:0; left:0;
  height:3px; background:rgba(255,255,255,0.2);
  z-index:99; width:0%;
}
</style>
</head>
<body>

<div id="stage">
  <div id="empty">
    <div class="icon">🖥️</div>
    <p>이미지를 기다리는 중...</p>
  </div>
</div>

<div id="status">● 연결 중...</div>
<div id="progress-bar"></div>

<script>
function getMonitorId() {
  return new URLSearchParams(window.location.search).get('id') || 'default';
}

const GITHUB_USER = 'zooz8624-afk';
const GITHUB_REPO = 'signage';
const MONITOR_ID  = getMonitorId();
const DATA_URL    = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/data/${MONITOR_ID}.json`;

let items       = [];
let duration    = 5;
let current     = 0;
let isAnimating = false;
let slideTimer  = null;
let lastDataStr = '';

// ==================== 슬라이드 생성 ====================
function createSlide(item) {
  const el = document.createElement('div');
  el.className = 'slide';

  if (item.type === 'video') {
    const video = document.createElement('video');
    video.src        = item.url;
    video.autoplay   = false; // 나중에 수동으로 play()
    video.muted      = true;
    video.playsInline = true;
    video.loop       = false;
    el.appendChild(video);
  } else {
    const img = document.createElement('img');
    img.src = item.url + '?t=' + Date.now();
    el.appendChild(img);
  }

  return el;
}

// ==================== 전환 애니메이션 ====================
function transitionTo(nextIdx, callback) {
  if (isAnimating) return;
  isAnimating = true;

  const stage = document.getElementById('stage');
  const currentEl = stage.querySelector('.slide.active');
  const nextItem  = items[nextIdx];

  // 다음 슬라이드 미리 준비 (오른쪽 대기)
  const nextEl = createSlide(nextItem);
  nextEl.classList.add('enter');
  stage.appendChild(nextEl);

  // 비디오 미리 로드
  const vid = nextEl.querySelector('video');
  if (vid) vid.load();

  // 한 프레임 후 애니메이션 시작
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      // 현재 슬라이드 → exit으로 변경
      if (currentEl) {
        currentEl.classList.remove('active');
        currentEl.classList.add('exit');
        requestAnimationFrame(() => currentEl.classList.add('go'));
      }

      // 새 슬라이드 → 오른쪽에서 진입
      nextEl.classList.add('go');

      // 애니메이션 완료 후 정리
      setTimeout(() => {
        if (currentEl) currentEl.remove();
        nextEl.classList.remove('enter', 'go');
        nextEl.classList.add('active');

        // 비디오 재생
        if (vid) vid.play().catch(() => {});

        isAnimating = false;
        current = nextIdx;
        callback && callback();
      }, 650);
    });
  });
}

// ==================== 슬라이드 스케줄 ====================
function scheduleCurrentItem() {
  clearTimeout(slideTimer);
  stopProgressBar();

  const item = items[current];
  if (!item) return;

  if (item.type === 'image') {
    startProgressBar(duration);
    slideTimer = setTimeout(() => {
      const next = (current + 1) % items.length;
      transitionTo(next, scheduleCurrentItem);
    }, duration * 1000);
  } else {
    // 동영상: onended 에서 처리
    const stage = document.getElementById('stage');
    const activeEl = stage.querySelector('.slide.active');
    const vid = activeEl && activeEl.querySelector('video');
    if (vid) {
      vid.onended = () => {
        const next = (current + 1) % items.length;
        transitionTo(next, scheduleCurrentItem);
      };
      // 혹시 이미 끝났으면 대비
      if (vid.ended) {
        const next = (current + 1) % items.length;
        transitionTo(next, scheduleCurrentItem);
      }
    }
  }
}

// ==================== 첫 슬라이드 시작 ====================
function startShow(newItems, newDuration) {
  items    = newItems;
  duration = newDuration || 5;
  current  = 0;
  isAnimating = false;

  clearTimeout(slideTimer);
  stopProgressBar();

  // 기존 슬라이드 전부 제거
  const stage = document.getElementById('stage');
  stage.querySelectorAll('.slide').forEach(el => el.remove());
  document.getElementById('empty').style.display = 'none';

  // 첫 슬라이드 바로 표시
  const firstEl = createSlide(items[0]);
  firstEl.classList.add('active');
  stage.appendChild(firstEl);

  const vid = firstEl.querySelector('video');
  if (vid) vid.play().catch(() => {});

  scheduleCurrentItem();
}

// ==================== 진행 바 ====================
function startProgressBar(sec) {
  const bar = document.getElementById('progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${sec}s linear`;
      bar.style.width = '100%';
    });
  });
}

function stopProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
}

// ==================== 업데이트 감지 ====================
async function checkUpdate() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) {
      document.getElementById('status').textContent = '● 데이터 없음';
      return;
    }

    const text = await res.text();
    if (text === lastDataStr) return;
    lastDataStr = text;

    const data = JSON.parse(text);
    if (!data.items || data.items.length === 0) {
      // 빈 슬라이드 — 검정 화면
      const stage = document.getElementById('stage');
      stage.querySelectorAll('.slide').forEach(el => el.remove());
      document.getElementById('empty').style.display = 'flex';
      clearTimeout(slideTimer);
      return;
    }

    startShow(data.items, data.duration);
    document.getElementById('status').textContent = '● ' + new Date().toLocaleTimeString('ko-KR');

  } catch(e) {
    document.getElementById('status').textContent = '● 연결 오류';
  }
}

checkUpdate();
setInterval(checkUpdate, 30000);
</script>
</body>
</html>
