<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signage Display</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; width:100vw; height:100vh; overflow:hidden; }

#slideshow {
  width:100vw; height:100vh;
  position:relative; overflow:hidden;
}

.slide {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:#111;
  transform: translateX(100%);
  transition: transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
}
.slide.active { transform: translateX(0); }
.slide.exit { transform: translateX(-100%); }

.slide img {
  width:100%; height:100%;
  object-fit: contain;
  display:block;
}

/* 빈 화면 */
#empty {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  color:#333; gap:16px;
}
#empty .icon { font-size:64px; }
#empty p { font-size:16px; letter-spacing:0.1em; font-family:sans-serif; }

/* 상태 표시 */
#status {
  position:fixed; bottom:16px; right:16px;
  background:rgba(0,0,0,0.5); color:#444;
  font-size:10px; padding:5px 10px; border-radius:20px;
  font-family:monospace; z-index:99;
}

/* 진행 바 */
#progress-bar {
  position:fixed; bottom:0; left:0;
  height:3px; background:rgba(255,255,255,0.15);
  transition:width linear;
  z-index:99;
}
</style>
</head>
<body>

<div id="slideshow">
  <div id="empty">
    <div class="icon">🖥️</div>
    <p>이미지를 기다리는 중...</p>
  </div>
</div>

<div id="status">● 연결 중...</div>
<div id="progress-bar" style="width:0%"></div>

<script>
// URL 파라미터에서 모니터 ID 읽기
function getMonitorId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id') || 'default';
}

const GITHUB_USER = 'zooz8624-afk';
const GITHUB_REPO = 'signage';
const MONITOR_ID = getMonitorId();
const DATA_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/data/${MONITOR_ID}.json`;

let slides = [];
let duration = 5; // 초
let currentIndex = 0;
let slideTimer = null;
let progressTimer = null;
let progressStart = null;

// ==================== 슬라이드쇼 ====================
function startSlideshow(newSlides, newDuration) {
  slides = newSlides;
  duration = newDuration || 5;
  currentIndex = 0;

  document.getElementById('empty').style.display = 'none';
  clearExistingSlides();
  buildSlide(0, true);
  scheduleNext();
}

function clearExistingSlides() {
  const ss = document.getElementById('slideshow');
  const existing = ss.querySelectorAll('.slide');
  existing.forEach(el => el.remove());
}

function buildSlide(idx, isFirst) {
  const ss = document.getElementById('slideshow');
  const el = document.createElement('div');
  el.className = 'slide' + (isFirst ? ' active' : '');
  el.id = 'slide-' + idx;

  const img = document.createElement('img');
  img.src = slides[idx] + '?t=' + Date.now();
  img.alt = '';
  el.appendChild(img);
  ss.appendChild(el);
  return el;
}

function nextSlide() {
  if (slides.length <= 1) { scheduleNext(); return; }

  const oldIdx = currentIndex;
  currentIndex = (currentIndex + 1) % slides.length;

  const oldEl = document.getElementById('slide-' + oldIdx);
  const newEl = buildSlide(currentIndex, false);

  // 슬라이드 애니메이션
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      if (oldEl) oldEl.classList.add('exit');
      newEl.classList.add('active');

      setTimeout(() => {
        if (oldEl) oldEl.remove();
      }, 750);
    });
  });

  scheduleNext();
}

function scheduleNext() {
  clearTimeout(slideTimer);
  slideTimer = setTimeout(nextSlide, duration * 1000);
  startProgressBar();
}

function startProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';

  clearInterval(progressTimer);
  requestAnimationFrame(() => {
    bar.style.transition = `width ${duration}s linear`;
    bar.style.width = '100%';
  });
}

// ==================== 서버에서 데이터 가져오기 ====================
let lastDataStr = '';

async function checkForUpdate() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) {
      document.getElementById('status').textContent = '● 데이터 없음';
      return;
    }

    const dataStr = await res.text();
    if (dataStr === lastDataStr) return; // 변경 없음
    lastDataStr = dataStr;

    const data = JSON.parse(dataStr);
    if (!data.slides || data.slides.length === 0) return;

    startSlideshow(data.slides, data.duration);
    document.getElementById('status').textContent = '● 업데이트 ' + new Date().toLocaleTimeString('ko-KR');

  } catch(e) {
    document.getElementById('status').textContent = '● 연결 오류';
  }
}

// 처음 실행
checkForUpdate();

// 30초마다 업데이트 확인
setInterval(checkForUpdate, 30000);
</script>
</body>
</html>
