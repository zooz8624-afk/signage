<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signage Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
  }

  #display {
    width: 100vw;
    height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
  }

  #main-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
    transition: opacity 0.8s ease;
  }

  #placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #444;
    gap: 20px;
  }

  #placeholder .icon {
    font-size: 80px;
    opacity: 0.3;
  }

  #placeholder p {
    font-size: 20px;
    letter-spacing: 0.1em;
    opacity: 0.4;
  }

  #status {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    color: #555;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .fade-in {
    animation: fadeIn 0.8s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div id="display">
  <div id="placeholder">
    <div class="icon">🖥️</div>
    <p>이미지를 기다리는 중...</p>
  </div>
  <img id="main-image" src="" alt="Signage Image" />
</div>

<div id="status">● 연결됨</div>

<script>
  // ✅ 여기에 본인의 GitHub 사용자명과 저장소명을 입력하세요
  const GITHUB_USER = 'zooz8624-afk';
  const GITHUB_REPO = 'signage';
  const IMAGE_FILE = 'current.txt'; // 현재 이미지 URL이 저장된 파일

  const RAW_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${IMAGE_FILE}`;

  let lastImageUrl = '';

  async function checkForUpdate() {
    try {
      const res = await fetch(RAW_URL + '?t=' + Date.now());
      if (!res.ok) return;

      const imageUrl = (await res.text()).trim();

      if (imageUrl && imageUrl !== lastImageUrl) {
        lastImageUrl = imageUrl;
        showImage(imageUrl);
        document.getElementById('status').textContent = '● 업데이트됨 ' + new Date().toLocaleTimeString('ko-KR');
      }
    } catch (e) {
      // 네트워크 오류 무시
    }
  }

  function showImage(url) {
    const img = document.getElementById('main-image');
    const placeholder = document.getElementById('placeholder');

    img.onload = () => {
      placeholder.style.display = 'none';
      img.style.display = 'block';
      img.classList.add('fade-in');
    };
    img.onerror = () => {
      placeholder.style.display = 'flex';
      img.style.display = 'none';
    };
    img.src = url;
  }

  // 처음 실행
  checkForUpdate();

  // 30초마다 새 이미지 확인
  setInterval(checkForUpdate, 30000);
</script>
</body>
</html>
